name: Tech News Bot

on:
  schedule:
    - cron: "0 */3 * * *"   # تشغيل كل 3 ساعات
  workflow_dispatch:        # تشغيل يدوي إذا بغيت

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    # استرجاع الكود من الريبو
    - name: Checkout repository
      uses: actions/checkout@v3

    # إعداد بايثون
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    # تثبيت المكتبات المطلوبة
    - name: Install dependencies
      run: |
        pip install requests
        pip install feedparser
        pip install google-genai

    # تشغيل البوت
    - name: Run bot
      env:
        PAGE_ID: ${{ secrets.PAGE_ID }}
        PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python bot.py

    # حفظ الأخبار المنشورة
    - name: Commit posted news
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git add posted_news.json
        git commit -m "Update posted news" || echo "no changes"
        git push
