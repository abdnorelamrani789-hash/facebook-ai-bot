name: 🤖 Tech News Bot

on:
  schedule:
    # ── بوت المنشور: 8:30 صباحاً و 6:30 مساءً (توقيت المغرب)
    - cron: '30 7,17 * * *'
    # ── بوت الفيديو: 12:00 ظهراً (توقيت المغرب)
    - cron: '0 11 * * *'
  workflow_dispatch:
    inputs:
      job_type:
        description: 'شنو تبغي تشغل؟'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - post_only
          - video_only

concurrency:
  group: tech-news-bot
  cancel-in-progress: false

jobs:

  # ════════════════════════════════════════
  # Job 1: بوت المنشور (صورة + نص)
  # ════════════════════════════════════════
  post-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      github.event_name == 'schedule' && (
        contains(fromJson('["30 7 * * *", "30 17 * * *"]'), github.event.schedule) ||
        github.event.schedule == '30 7,17 * * *'
      ) ||
      github.event_name == 'workflow_dispatch' && (
        github.event.inputs.job_type == 'both' ||
        github.event.inputs.job_type == 'post_only'
      )

    steps:
      - name: 📥 استنساخ المستودع
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: 🐍 إعداد Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 تثبيت الاعتماديات
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser Pillow

      - name: 🚀 تشغيل بوت المنشور
        env:
          FB_PAGE_ID:           ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          NEWS_API_KEY:         ${{ secrets.NEWS_API_KEY }}
          UNSPLASH_ACCESS_KEY:  ${{ secrets.UNSPLASH_ACCESS_KEY }}
          PEXELS_API_KEY:       ${{ secrets.PEXELS_API_KEY }}
        run: python bot.py

      - name: 📊 عرض الحالة
        if: always()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          cat posted_news.json 2>/dev/null | python3 -c "
          import json,sys
          data = json.load(sys.stdin)
          items = data if isinstance(data, list) else list(data.keys())
          print(f'📰 إجمالي الأخبار المنشورة: {len(items)}')
          " 2>/dev/null || echo "posted_news.json غير موجود"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: 🧹 تنظيف
        if: always()
        run: rm -f temp_image.jpg

      - name: 💾 حفظ الحالة
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 تحديث ملفات المنشور [skip ci]"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          file_pattern: "posted_news.json sources_state.json used_images.json"
          skip_dirty_check: false

      - name: ❌ تسجيل الفشل
        if: failure()
        run: echo "::error::فشل بوت المنشور — راجع الـ logs"

  # ════════════════════════════════════════
  # Job 2: بوت الفيديو (Reels يومياً)
  # ════════════════════════════════════════
  video-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # الفيديو يحتاج وقت أطول
    if: |
      github.event_name == 'schedule' && github.event.schedule == '0 11 * * *' ||
      github.event_name == 'workflow_dispatch' && (
        github.event.inputs.job_type == 'both' ||
        github.event.inputs.job_type == 'video_only'
      )

    steps:
      - name: 📥 استنساخ المستودع
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: 🐍 إعداد Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 تثبيت الاعتماديات (مع مكتبات الفيديو)
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser Pillow moviepy gTTS
          # تثبيت ffmpeg لـ moviepy
          sudo apt-get install -y ffmpeg

      - name: 🎬 تشغيل بوت الفيديو
        env:
          FB_PAGE_ID:           ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          NEWS_API_KEY:         ${{ secrets.NEWS_API_KEY }}
          UNSPLASH_ACCESS_KEY:  ${{ secrets.UNSPLASH_ACCESS_KEY }}
          PEXELS_API_KEY:       ${{ secrets.PEXELS_API_KEY }}
        run: python video_bot.py

      - name: 📊 عرض الحالة
        if: always()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          cat video_posted_news.json 2>/dev/null | python3 -c "
          import json,sys
          data = json.load(sys.stdin)
          print(f'🎬 إجمالي الفيديوهات المنشورة: {len(data)}')
          " 2>/dev/null || echo "video_posted_news.json غير موجود"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: 🧹 تنظيف
        if: always()
        run: rm -f temp_audio.mp3 temp_frame.jpg temp_video.mp4 temp_overlay.png

      - name: 💾 حفظ الحالة
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🎬 تحديث ملفات الفيديو [skip ci]"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          file_pattern: "video_posted_news.json"
          skip_dirty_check: false

      - name: ❌ تسجيل الفشل
        if: failure()
        run: echo "::error::فشل بوت الفيديو — راجع الـ logs"
