name: Tech News Bot

on:
  schedule:
    # تشغيل كل 3 ساعات (0:00, 3:00, 6:00, ... حسب UTC)
    - cron: '0 */3 * * *'
  workflow_dispatch:  # للسماح بالتشغيل اليدوي

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: استنساخ المستودع باستخدام PAT token
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}  # استخدام التوكن الشخصي بدلاً من GITHUB_TOKEN

      - name: إعداد Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: تثبيت الاعتماديات
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: تشغيل البوت
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python bot.py

      # خطوة اختيارية لعرض محتوى ملفات الحالة بعد التشغيل (للتأكد من التغييرات)
      - name: عرض ملفات الحالة
        run: |
          echo "📄 posted_news.json:"
          cat posted_news.json || echo "الملف غير موجود"
          echo "📄 sources_state.json:"
          cat sources_state.json || echo "الملف غير موجود"

      - name: رفع التغييرات إلى المستودع
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "تحديث ملفات الحالة [skip ci]"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          file_pattern: "posted_news.json sources_state.json"
          skip_dirty_check: false
