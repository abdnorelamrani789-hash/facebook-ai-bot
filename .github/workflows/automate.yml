name: Facebook AI Bot Auto Post

# تشغيل تلقائي + إمكانية التشغيل اليدوي
on:
  schedule:
    # 3 مرات يومياً: 09:00، 15:00، 21:00 UTC
    - cron: '0 9,15,21 * * *'
  workflow_dispatch: # تشغيل يدوي إذا بغيت

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # نسخ الملفات
      - name: Checkout repo
        uses: actions/checkout@v3

      # إعداد بايثون
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # تثبيت المكتبات
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # تشغيل البوت
      - name: Run Facebook AI Bot
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python bot.py
