name: تقنية بالدارجة - تشغيل البوت

on:
  schedule:
    - cron: '0 * * * *'     # كل ساعة (يمكن تغييره لكل 30 دقيقة: '*/30 * * * *')
  workflow_dispatch:        # زر "Run workflow" يدوي من GitHub

permissions:
  contents: write          # مهم عشان يقدر يحفظ posted_news.json

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: جلب الكود
        uses: actions/checkout@v4

      - name: تثبيت Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: تثبيت المكتبات المطلوبة
        run: |
          pip install feedparser requests

      - name: استرجاع ملف posted_news.json من السابق
        uses: actions/cache@v4
        with:
          path: posted_news.json
          key: posted-news-cache-v1
          restore-keys: |
            posted-news-cache-

      - name: تشغيل البوت
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python bot.py

      - name: حفظ التغييرات في posted_news.json
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add posted_news.json
          if git diff --staged --quiet; then
            echo "✅ لا تغييرات جديدة في posted_news.json"
          else
            git commit -m "Update posted_news.json - $(date '+%Y-%m-%d %H:%M')"
            git push
            echo "✅ تم حفظ الخبراء الجدد بنجاح"
          fi
