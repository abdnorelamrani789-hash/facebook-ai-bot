name: 🤖 Tech Content Bot

on:
  schedule:
    # ── منشور الصباح: 8:30 صباحاً (توقيت المغرب = UTC+1)
    - cron: '30 7 * * *'
    # ── منشور المساء: 8:00 مساءً (توقيت المغرب = UTC+1)
    - cron: '0 19 * * *'

  # تشغيل يدوي من GitHub عند الحاجة
  workflow_dispatch:
    inputs:
      session:
        description: 'وقت النشر'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning
          - evening

# منع تشغيل أكثر من instance في نفس الوقت
concurrency:
  group: tech-content-bot
  cancel-in-progress: false

jobs:

  # ════════════════════════════════════════
  # بوت المنشور التقني الفيروسي
  # ════════════════════════════════════════
  post-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ─── 1. استنساخ المستودع ─────────────────────────
      - name: 📥 استنساخ المستودع
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      # ─── 2. إعداد Python ─────────────────────────────
      - name: 🐍 إعداد Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ─── 3. تثبيت الاعتماديات ────────────────────────
      - name: 📦 تثبيت الاعتماديات
        run: |
          python -m pip install --upgrade pip
          pip install requests Pillow

      # ─── 4. تشغيل البوت ──────────────────────────────
      - name: 🚀 تشغيل البوت
        env:
          FB_PAGE_ID:           ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY:       ${{ secrets.PEXELS_API_KEY }}
          UNSPLASH_ACCESS_KEY:  ${{ secrets.UNSPLASH_ACCESS_KEY }}
          # وقت النشر — يستخدمه البوت لاختيار نوع المحتوى
          POST_SESSION: ${{ github.event.schedule == '30 7 * * *' && 'morning' || github.event.schedule == '0 19 * * *' && 'evening' || github.event.inputs.session || 'morning' }}
        run: python bot.py

      # ─── 5. عرض إحصائيات المنشورات ──────────────────
      - name: 📊 إحصائيات
        if: always()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📅 التاريخ: $(date '+%Y-%m-%d %H:%M')"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          cat posted_content.json 2>/dev/null | python3 -c "
          import json, sys
          from collections import Counter
          data = json.load(sys.stdin)
          print(f'📌 إجمالي المنشورات: {len(data)}')
          if data:
              types = Counter(p.get('type','؟') for p in data)
              print('📊 توزيع الأنواع:')
              for t, c in types.most_common():
                  print(f'   {t}: {c} منشور')
              last = data[-1]
              print(f'✅ آخر منشور: {last.get(\"type\")} — {last.get(\"topic\",\"\")[:50]}')
              print(f'📅 تاريخه: {last.get(\"date\")}')
          " 2>/dev/null || echo "  posted_content.json غير موجود بعد"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      # ─── 6. تنظيف الملفات المؤقتة ────────────────────
      - name: 🧹 تنظيف
        if: always()
        run: rm -f temp_image.jpg

      # ─── 7. حفظ الحالة في GitHub ─────────────────────
      - name: 💾 حفظ الحالة
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 تحديث المنشورات [skip ci]"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          file_pattern: "posted_content.json used_images.json"
          skip_dirty_check: false

      # ─── 8. إشعار عند الفشل ──────────────────────────
      - name: ❌ تسجيل الفشل
        if: failure()
        run: |
          echo "::error::فشل البوت — راجع الـ logs أعلاه"
          echo "الوقت: $(date)"
          echo "تحقق من: FB_PAGE_ACCESS_TOKEN, GEMINI_API_KEY"
