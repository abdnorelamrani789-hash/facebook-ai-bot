name: Tech News Bot

on:
  schedule:
    # تشغيل كل 3 ساعات (يمكنك تعديل التوقيت حسب حاجتك)
    - cron: '0 */3 * * *'
  workflow_dispatch:  # للسماح بالتشغيل اليدوي

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # نحتاج token للـ push لاحقًا
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bot
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python bot.py

      - name: Commit and push state files (if changed)
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add posted_news.json sources_state.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update state files [skip ci]"
          git push
